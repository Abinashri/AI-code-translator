<!DOCTYPE html>
<html>
<head>
    <title>AI Code Translator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

</head>
<body>

<div class="chat-container">

    <h1>⚡ AI Code Translator</h1>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <textarea id="inputCode" placeholder="Enter your code..."></textarea>
        <div class="output-container">
            <button onclick="copyCode()">Copy</button>
            <pre><code id="outputCode" class="language-python"></code></pre>
        </div>
        
        <div class="controls">
            <select id="fromLang">
                <option value="java">Java</option>
                <option value="python">Python</option>
                <option value="c">C</option>
                <option value="cpp">C++</option>
                <option value="javascript">JavaScript</option>
                <option value="php">PHP</option>
            </select>
            
            <select id="toLang">
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="c">C</option>
                <option value="cpp">C++</option>
                <option value="javascript">JavaScript</option>
                <option value="php">PHP</option>
            </select>
            

            <button onclick="convertCode()">Convert</button>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
